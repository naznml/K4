<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>
  Педагогика — тест
</title>

<style>
* {
  box-sizing: border-box;
}

:root {
  --primary: #7c3aed;
  --primary-dark: #5b21b6;
  --primary-light: #ede9fe;

  --background: #f7f5fb;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #667085;
  --border: #ddd6e8;

  --correct: #15803d;
  --correct-background: #dcfce7;

  --wrong: #b91c1c;
  --wrong-background: #fee2e2;

  --partial: #a16207;
  --partial-background: #fef3c7;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Arial,
    sans-serif;
  background: var(--background);
  color: var(--text);
  line-height: 1.55;
}

header {
  padding: 34px 16px 58px;
  background:
    linear-gradient(
      135deg,
      #6d28d9,
      #9333ea
    );
  color: white;
  text-align: center;
}

header h1 {
  margin: 0 0 10px;
  font-size: 34px;
  line-height: 1.2;
}

header p {
  margin: 0;
  font-size: 17px;
  opacity: 0.95;
}

.container {
  width: min(
    960px,
    calc(100% - 24px)
  );
  margin: -32px auto 55px;
}

.section-navigation {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  padding: 16px;
  margin-bottom: 18px;
  background: white;
  border-radius: 17px;
  box-shadow:
    0 5px 20px
    rgba(31, 41, 55, 0.09);
}

.section-button {
  border: 2px solid #ddd6e8;
  border-radius: 13px;
  padding: 16px 12px;
  background: #faf8ff;
  color: #344054;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  transition: 0.2s;
}

.section-button:hover {
  border-color: var(--primary);
}

.section-button.active {
  border-color: var(--primary);
  background: var(--primary);
  color: white;
}

.test-section {
  display: none;
}

.test-section.active {
  display: block;
}

.section-header {
  padding: 21px;
  margin-bottom: 15px;
  background: white;
  border-radius: 16px;
  box-shadow:
    0 4px 18px
    rgba(31, 41, 55, 0.07);
}

.section-header h2 {
  margin: 0 0 7px;
  color: var(--primary);
  font-size: 27px;
}

.section-header p {
  margin: 0;
  color: var(--muted);
}

.section-information {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 13px;
}

.information-badge {
  display: inline-flex;
  align-items: center;
  padding: 7px 11px;
  border-radius: 999px;
  background: var(--primary-light);
  color: var(--primary-dark);
  font-size: 14px;
  font-weight: 800;
}

.progress-card {
  padding: 16px 18px;
  margin-bottom: 15px;
  background: white;
  border-radius: 15px;
  box-shadow:
    0 4px 18px
    rgba(31, 41, 55, 0.07);
}

.progress-information {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 9px;
  color: var(--muted);
}

.progress-information strong {
  color: var(--primary);
}

.progress-line {
  width: 100%;
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: #e7e2ee;
}

.progress-line span {
  display: block;
  width: 0;
  height: 100%;
  border-radius: 999px;
  background: var(--primary);
  transition: width 0.25s;
}

.question {
  padding: 21px;
  margin-bottom: 15px;
  background: var(--card);
  border: 1px solid #e5e0eb;
  border-radius: 16px;
  box-shadow:
    0 4px 17px
    rgba(31, 41, 55, 0.06);
}

.question-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 38px;
  height: 35px;
  margin-bottom: 12px;
  padding: 0 11px;
  border-radius: 10px;
  background: var(--primary-light);
  color: var(--primary-dark);
  font-weight: 900;
}

.question-title {
  margin: 0 0 16px;
  font-size: 18px;
  line-height: 1.55;
}

.multiple-answer-hint {
  margin: -4px 0 14px;
  padding: 10px 12px;
  border-radius: 10px;
  background: #fef3c7;
  color: #92400e;
  font-size: 14px;
  font-weight: 800;
}

.options {
  display: grid;
  gap: 9px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 13px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: white;
  cursor: pointer;
  transition: 0.18s;
}

.option:hover {
  border-color: #b8a2ee;
  background: #fcfbff;
}

.option input {
  flex: 0 0 auto;
  margin-top: 4px;
  transform: scale(1.15);
  accent-color: var(--primary);
}

.option-letter {
  flex: 0 0 25px;
  color: #475467;
  font-weight: 900;
}

.option.correct {
  border-color: #22c55e;
  background: var(--correct-background);
  color: #166534;
}

.option.wrong {
  border-color: #ef4444;
  background: var(--wrong-background);
  color: #991b1b;
}

.explanation {
  display: none;
  margin-top: 17px;
  padding-top: 16px;
  border-top: 1px solid #e4e7ec;
}

.question.checked .explanation {
  display: block;
}

.question-score {
  margin-bottom: 12px;
  padding: 11px 14px;
  border-radius: 10px;
  font-weight: 900;
}

.question-score.full {
  background: var(--correct-background);
  color: #166534;
}

.question-score.partial {
  background: var(--partial-background);
  color: var(--partial);
}

.question-score.zero {
  background: var(--wrong-background);
  color: #991b1b;
}

.correct-answer {
  padding: 12px 14px;
  border-radius: 11px;
  background: var(--correct-background);
  color: #166534;
  font-weight: 800;
}

.explanation-title {
  margin: 14px 0 7px;
  color: var(--primary-dark);
  font-size: 17px;
  font-weight: 900;
}

.explanation-text {
  margin: 0;
  padding: 13px 14px;
  border-radius: 11px;
  background: #faf8ff;
}

.key-fact {
  margin-top: 11px;
  padding: 12px 14px;
  border-left: 5px solid var(--primary);
  border-radius: 8px;
  background: var(--primary-light);
  font-weight: 750;
}

.source-warning {
  margin-top: 11px;
  padding: 12px 14px;
  border-left: 5px solid #f59e0b;
  border-radius: 8px;
  background: #fffbeb;
  color: #92400e;
}

.result-card {
  display: none;
  padding: 24px;
  margin: 18px 0;
  border-radius: 16px;
  background: white;
  text-align: center;
  box-shadow:
    0 4px 18px
    rgba(31, 41, 55, 0.08);
}

.result-card.show {
  display: block;
}

.result-card h3 {
  margin: 0 0 8px;
  color: var(--primary);
}

.score {
  margin: 5px 0;
  color: var(--primary);
  font-size: 39px;
  font-weight: 900;
}

.actions {
  position: sticky;
  bottom: 0;
  z-index: 20;
  display: flex;
  gap: 10px;
  padding: 13px 0 17px;
  background:
    rgba(247, 245, 251, 0.95);
  backdrop-filter: blur(9px);
}

.actions button {
  border: none;
  border-radius: 12px;
  padding: 15px 17px;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
}

.show-result-button {
  flex: 1;
  background: var(--primary);
  color: white;
}

.reset-button {
  background: #e5e7eb;
  color: #1f2937;
}

.total-result {
  display: none;
  margin-top: 25px;
  padding: 25px;
  border-radius: 17px;
  background:
    linear-gradient(
      135deg,
      #6d28d9,
      #9333ea
    );
  color: white;
  text-align: center;
}

.total-result.show {
  display: block;
}

.total-result h2 {
  margin: 0 0 10px;
}

.total-score {
  font-size: 43px;
  font-weight: 900;
}

@media (max-width: 650px) {
  header h1 {
    font-size: 27px;
  }

  .section-navigation {
    grid-template-columns: 1fr;
  }

  .question {
    padding: 17px 15px;
  }

  .question-title {
    font-size: 17px;
  }

  .actions {
    flex-direction: column-reverse;
  }
}
</style>
</head>

<body>

<header>
  <h1>
    Педагогика
  </h1>

  <p>
    Кешенді тестілеуге дайындық
  </p>
</header>

<main class="container">

  <nav class="section-navigation">

    <button
      type="button"
      id="pedagogyTab"
      class="section-button active"
      onclick="openSection('pedagogy')"
    >
      Педагогика
    </button>
</nav>

  <section
    id="pedagogySection"
    class="test-section active"
  >

    <div class="section-header">
      <h2>Педагогика</h2>

      <p>
        30 сұрақ. Әр сұрақта бір дұрыс жауап бар.
        Әр дұрыс жауапқа 1 балл беріледі.
      </p>

      <div class="section-information">

        <span class="information-badge">
          30 сұрақ
        </span>

        <span class="information-badge">
          Ең жоғары балл: 30
        </span>

      </div>
    </div>

    <div class="progress-card">

      <div class="progress-information">
        <span>Жауап беру барысы</span>

        <strong id="pedagogyProgressText">
          0 / 30
        </strong>
      </div>

      <div class="progress-line">
        <span id="pedagogyProgressBar"></span>
      </div>

    </div>

    <div
      id="pedagogyResult"
      class="result-card"
    >
      <h3>Педагогика нәтижесі</h3>

      <div
        id="pedagogyScore"
        class="score"
      >
        0 / 30
      </div>
    </div>

    <div id="pedagogyQuiz"></div>

    <div class="actions">

      <button
        type="button"
        class="reset-button"
        onclick="resetPedagogyTest()"
      >
        Қайта бастау
      </button>

      <button
        type="button"
        class="show-result-button"
        onclick="showPedagogyResults()"
      >
        Нәтижені көрсету
      </button>

    </div>

  </section>
<script>
const letters = [
  "A",
  "B",
  "C",
  "D",
  "E",
  "F",
  "G",
  "H"
];

const pedagogyQuestions = [

  {
    number: 1,

    question:
      "Технологиялық әрекеттің үнемі жүзеге асуы, құзыреттілік және кәсіби қажетті сапалардың артуы, еңбек өнімділігінің тиімділігінің артуы",

    options: [
      "кәсіби жаңару",
      "кәсіби өсу",
      "кәсіби даму",

    explanation:

    keyFact:
      "Кәсіби даму – кәсіби құзыреттілік пен еңбек тиімділігінің үздіксіз артуы."
  },

  {
    number: 2,

    question:
      "Бағдарлама материалының мазмұнына, мектептің материалдық базасына, оқушылардың оқу материалы мен жұмысының сипатына сүйене отырып анықталады",

    options: [
      "сабақтың міндеті",
      "сабақтың типі",
      "сабақтың мазмұны",

    explanation:

    keyFact:
      "Сабақ әдісін таңдау оқу материалына, оқушы ерекшелігіне және материалдық базаға тәуелді."
  },

  {
    number: 3,

    question:
      "Шәкірттің білімге деген өте белсенді ақыл-ой әрекеті",

    options: [
      "танымдық игеру",
      "танымдық қажеттілік",
      "танымдық қызығушылық",
      "танымдық белсенділік",
      "танымдық іс-әрекет"
    ],

    correct: 4,

    explanation:
      "Танымдық іс-әрекет – шәкірттің білімге деген өте белсенді ақыл-ой әрекеті. Ол танымдық қажеттіліктен, мақсаттан, уәжден және әрекетті орындау тәсілдерінен тұрады.",

    keyFact:

  {

    options: [
      "өзін-өзі сынау",

      "өзін-өзі ұялту",
      "өзін-өзі жазалау",
      "эмпатия"
    ],

    correct: 4,

    explanation:
      "Эмпатия – адамның өзін ойша басқа адамның орнына қойып, оның сезімін, жағдайын және көзқарасын түсіне білу қабілеті.",

    keyFact:

  {

let pedagogyResultScore = null;

function preparePedagogyOnlySite() {
  document.title = "Педагогика — тест";
}

function getCorrectIndexes(question) {
  if (Array.isArray(question.correct)) {
    return [...question.correct];
  }

  return [question.correct];
}

function getCorrectAnswerText(question) {
  return getCorrectIndexes(question)
    .map(index => {
      return `
        ${letters[index]})
        ${question.options[index]}
      `;
    })
    .join("<br>");
}

function renderQuestion(
  question,
  questionIndex
) {
  const optionsHtml =
    question.options
      .map((option, optionIndex) => {
        return `
          <label
            class="option"
            data-option-index="${optionIndex}"
          >
            <input
              type="radio"
              name="pedagogyQuestion${questionIndex}"
              value="${optionIndex}"
            >

            <span class="option-letter">
              ${letters[optionIndex]})
            </span>

            <span>
              ${option}
            </span>
          </label>
        `;
      })
      .join("");

  const warningHtml =
    question.warning
      ? `
        <div class="source-warning">
          ${question.warning}
        </div>
      `
      : "";

  return `
    <article
      class="question"
      data-question-index="${questionIndex}"
    >
      <div class="question-number">
        ${question.number}-сұрақ
      </div>

      <h3 class="question-title">
        ${question.question}
      </h3>

      <div class="options">
        ${optionsHtml}
      </div>

      <div class="explanation">

        <div class="question-score"></div>

        <div class="correct-answer">
          Дұрыс жауап:<br>
          ${getCorrectAnswerText(question)}
        </div>

        ${warningHtml}

        <div class="explanation-title">
          Түсіндірме
        </div>

        <p class="explanation-text">
          ${question.explanation}
        </p>

        <div class="key-fact">
          ${question.keyFact}
        </div>

      </div>
    </article>
  `;
}

function renderPedagogyQuestions() {
  const quiz =
    document.getElementById(
      "pedagogyQuiz"
    );

  quiz.innerHTML =
    pedagogyQuestions
      .map((question, questionIndex) => {
        return renderQuestion(
          question,
          questionIndex
        );
      })
      .join("");

  quiz
    .querySelectorAll("input")
    .forEach(input => {
      input.addEventListener(
        "change",
        updatePedagogyProgress
      );
    });
}

function getSelectedIndex(questionBlock) {
  const selectedInput =
    questionBlock.querySelector(
      "input:checked"
    );

  if (!selectedInput) {
    return null;
  }

  return Number(selectedInput.value);
}

function markQuestionAnswers(
  questionBlock,
  question,
  selectedIndex
) {
  const optionBlocks =
    questionBlock.querySelectorAll(
      ".option"
    );

  optionBlocks.forEach(
    (optionBlock, optionIndex) => {
      optionBlock.classList.remove(
        "correct",
        "wrong"
      );

      if (
        optionIndex === question.correct
      ) {
        optionBlock.classList.add(
          "correct"
        );
      }

      if (
        selectedIndex === optionIndex &&
        selectedIndex !== question.correct
      ) {
        optionBlock.classList.add(
          "wrong"
        );
      }
    }
  );
}

function showQuestionScore(
  questionBlock,
  points
) {
  const scoreElement =
    questionBlock.querySelector(
      ".question-score"
    );

  scoreElement.classList.remove(
    "full",
    "partial",
    "zero"
  );

  scoreElement.textContent =
    `Бұл сұрақ бойынша: ${points} / 1 балл`;

  if (points === 1) {
    scoreElement.classList.add("full");
  } else {
    scoreElement.classList.add("zero");
  }
}

function updatePedagogyProgress() {
  const questionBlocks =
    document.querySelectorAll(
      "#pedagogySection .question"
    );

  let answeredQuestions = 0;

  questionBlocks.forEach(
    questionBlock => {
      if (
        questionBlock.querySelector(
          "input:checked"
        )
      ) {
        answeredQuestions++;
      }
    }
  );

  document.getElementById(
    "pedagogyProgressText"
  ).textContent =
    `${answeredQuestions} / ${pedagogyQuestions.length}`;

  const progressPercent =
    (
      answeredQuestions /
      pedagogyQuestions.length
    ) * 100;

  document.getElementById(
    "pedagogyProgressBar"
  ).style.width =
    `${progressPercent}%`;
}

function showPedagogyResults() {
  const questionBlocks =
    document.querySelectorAll(
      "#pedagogySection .question"
    );

  let totalPoints = 0;

  questionBlocks.forEach(
    (questionBlock, questionIndex) => {
      const question =
        pedagogyQuestions[
          questionIndex
        ];

      const selectedIndex =
        getSelectedIndex(
          questionBlock
        );

      const points =
        selectedIndex ===
        question.correct
          ? 1
          : 0;

      totalPoints += points;

      markQuestionAnswers(
        questionBlock,
        question,
        selectedIndex
      );

      showQuestionScore(
        questionBlock,
        points
      );

      questionBlock.classList.add(
        "checked"
      );

      questionBlock
        .querySelectorAll("input")
        .forEach(input => {
          input.disabled = true;
        });
    }
  );

  pedagogyResultScore =
    totalPoints;

  document.getElementById(
    "pedagogyScore"
  ).textContent =
    `${pedagogyResultScore} / 30`;

  const result =
    document.getElementById(
      "pedagogyResult"
    );

  result.classList.add("show");

  result.scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
}

function resetPedagogyTest() {
  pedagogyResultScore = null;

  const section =
    document.getElementById(
      "pedagogySection"
    );

  section
    .querySelectorAll("input")
    .forEach(input => {
      input.checked = false;
      input.disabled = false;
    });

  section
    .querySelectorAll(".option")
    .forEach(option => {
      option.classList.remove(
        "correct",
        "wrong"
      );
    });

  section
    .querySelectorAll(".question")
    .forEach(questionBlock => {
      questionBlock.classList.remove(
        "checked"
      );

      const scoreElement =
        questionBlock.querySelector(
          ".question-score"
        );

      scoreElement.textContent = "";

      scoreElement.classList.remove(
        "full",
        "partial",
        "zero"
      );
    });

  document.getElementById(
    "pedagogyResult"
  ).classList.remove("show");

  document.getElementById(
    "pedagogyScore"
  ).textContent =
    "0 / 30";

  updatePedagogyProgress();

  document.getElementById(
    "pedagogySection"
  ).scrollIntoView({
    behavior: "smooth",
    block: "start"
  });
}

function openSection() {
  const section = document.getElementById("pedagogySection");

  if (section) {
    section.classList.add("active");
  }

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

preparePedagogyOnlySite();
renderPedagogyQuestions();
updatePedagogyProgress();
</script>
